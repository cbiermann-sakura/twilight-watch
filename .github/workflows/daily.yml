name: Daily Twilight Watch

on:
  schedule:
    - cron: "0 9 * * *"   # täglich 09:00 UTC
  workflow_dispatch:        # manuell auslösbar

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run analysis
        run: python analyze.py

      - name: Commit updated data
        run: |
          git config user.name  "twilight-watch-bot"
          git config user.email "action@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "reading: $(date -u +%Y-%m-%d)"
          git push
